<!DOCTYPE html>
<html>
<head>
  <title>Internal CSS Multiple Elements</title>
  <style>
    h1 {
      text-align: center;
    }
    p {
      color: green;
    }
    div {
      background-color: lightgray;
      padding: 10px;
    }
  </style>
</head>
<body>
  <h1>Profile Heading</h1>
  <p>This is a green paragraph.</p>
  <div>This is a div with light gray background.</div>
</body>
</html>
