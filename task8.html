<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Practice 2 - Class Selector</title>
  <style>
    /* Class Selector */
    .highlight {
      background-color: yellow;
      color: black;
    }
  </style>
</head>
<body>
  <h2>Practice 2: Class Selector</h2>

  <!-- h1 with highlight class -->
  <h1 class="highlight">This is a highlighted heading</h1>

  <!-- p with highlight class -->
  <p class="highlight">This paragraph is highlighted.</p>

  <!-- normal p without class -->
  <p>This paragraph is not highlighted.</p>
</body>
</html>
